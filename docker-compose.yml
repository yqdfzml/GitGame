services:
  mysql:
    image: mysql:8.4
    container_name: gitgame-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: git_game
      MYSQL_USER: gitgame
      MYSQL_PASSWORD: gitgame
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitgame-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_PORT: 3000
      DATABASE_URL: mysql://gitgame:gitgame@mysql:3306/git_game
      JWT_SECRET: change-me-in-development-docker-only
      JWT_EXPIRES_IN: 86400
      JWT_REFRESH_EXPIRES_IN: 2592000
      CORS_ORIGIN: http://localhost:5173
      COOKIE_SECURE: "false"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gitgame-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
